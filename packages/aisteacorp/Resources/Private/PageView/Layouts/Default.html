<header class="header sticky">
    <f:page.headerData>
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebSite",
                "name": "Der Zahnarzt",
                "url": "https://derzahnarzt.de/",
                "inLanguage": "de-DE"
            }
        </script>
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Dentist",
                "name": "Kompetenzzentrum für biologische Zahnmedizin",
                "url": "https://derzahnarzt.de/",
                "telephone": "+49 7721 22591",
                "email": "info@derzahnarzt.de",
                "address": {
                    "@type": "PostalAddress",
                    "streetAddress": "Brigachstraße 4",
                    "postalCode": "78048",
                    "addressLocality": "Villingen-Schwenningen",
                    "addressCountry": "DE"
                },
                "openingHoursSpecification": [
                    {
                        "@type": "OpeningHoursSpecification",
                        "dayOfWeek": "Monday",
                        "opens": "08:00",
                        "closes": "18:00"
                    },
                    {
                        "@type": "OpeningHoursSpecification",
                        "dayOfWeek": "Tuesday",
                        "opens": "08:00",
                        "closes": "18:00"
                    },
                    {
                        "@type": "OpeningHoursSpecification",
                        "dayOfWeek": "Wednesday",
                        "opens": "08:00",
                        "closes": "14:00"
                    },
                    {
                        "@type": "OpeningHoursSpecification",
                        "dayOfWeek": "Thursday",
                        "opens": "08:00",
                        "closes": "18:00"
                    }
                ]
            }
        </script>
    </f:page.headerData>

    <!-- Logo mit Link zur Startseite -->
    <a href="/" class="logo-link" title="Zur Startseite">
        <img src="/fileadmin/logo/derzahnarzt-logo.png" alt="Der Zahnarzt" class="logo" width="150" height="60">
    </a>

    <button class="burger" aria-label="Menü öffnen / schließen" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Navigation -->
    <nav>
        <ul class="nav-main">
            <f:for each="{mainnavigation}" as="mainnavigationItem">
                <li class="{f:if(condition: mainnavigationItem.active, then:'active')}">
                    <a href="{mainnavigationItem.link}" target="{mainnavigationItem.target}" title="{mainnavigationItem.title}">
                        {mainnavigationItem.title}
                    </a>
                    <f:if condition="{mainnavigationItem.children}">
                        <ul class="nav-dropdown">
                            <f:for each="{mainnavigationItem.children}" as="child">
                                <li class="{f:if(condition: child.active, then:'active')}">
                                    <a href="{child.link}" target="{child.target}" title="{child.title}">
                                        {child.title}
                                    </a>
                                </li>
                            </f:for>
                        </ul>
                    </f:if>
                </li>
            </f:for>
        </ul>
    </nav>
</header>
<f:render section="Main" />
